<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f9cf9;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f9cf9;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3182ce;
    }

    .input-row button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-badge {
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .stat-total {
      background: #ebf4ff;
      color: #2b6cb0;
    }

    .stat-done {
      background: #f0fff4;
      color: #276749;
    }

    .list {
      list-style: none;
    }

    .list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      transition: background 0.15s;
    }

    .list li:hover {
      background: #edf2f7;
    }

    .list li.checked {
      background: #f0fff4;
    }

    .list li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #38a169;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-word;
      transition: color 0.2s;
    }

    .checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 2px solid #fed7d7;
      color: #e53e3e;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }

    .clear-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .error-msg {
      background: #fff5f5;
      color: #e53e3e;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>
    <p class="subtitle">오늘 살 것들을 적어보세요</p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="80">
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="stats">
      <span class="stat-badge stat-total" id="statTotal">전체 0</span>
      <span class="stat-badge stat-done" id="statDone">완료 0</span>
    </div>

    <ul class="list" id="list"></ul>

    <div class="loading" id="loading">불러오는 중...</div>
    <div class="empty" id="empty" style="display:none">아직 아이템이 없어요. 추가해 보세요!</div>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" disabled>
      완료 항목 삭제
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://uhesdempxmyzhweznyrt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVoZXNkZW1weG15emh3ZXpueXJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDA1NDMsImV4cCI6MjA5MTExNjU0M30.Bcl9C2F3tAbZJlSi5hbqAWbdAX3UIRb8HUbXVwglSys';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    const input = document.getElementById('itemInput');
    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');
    const loadingEl = document.getElementById('loading');
    const clearBtn = document.getElementById('clearBtn');
    const addBtn = document.getElementById('addBtn');
    const errorMsg = document.getElementById('errorMsg');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
    }

    function render() {
      listEl.innerHTML = '';

      const total = items.length;
      const done = items.filter(i => i.checked).length;

      document.getElementById('statTotal').textContent = `전체 ${total}`;
      document.getElementById('statDone').textContent = `완료 ${done}`;
      loadingEl.style.display = 'none';
      emptyEl.style.display = total === 0 ? 'block' : 'none';
      clearBtn.disabled = done === 0;

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => toggleItem(item.id, cb.checked));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.addEventListener('click', () => deleteItem(item.id));

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(del);
        listEl.appendChild(li);
      });
    }

    async function loadItems() {
      const { data, error } = await supabaseClient
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        showError('데이터를 불러오지 못했습니다: ' + error.message);
        loadingEl.style.display = 'none';
        return;
      }

      items = data;
      render();
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text) return;

      addBtn.disabled = true;
      const { data, error } = await supabaseClient
        .from('shopping_items')
        .insert([{ text, checked: false }])
        .select()
        .single();

      addBtn.disabled = false;

      if (error) {
        showError('추가 실패: ' + error.message);
        return;
      }

      items.push(data);
      input.value = '';
      render();
      input.focus();
    }

    async function toggleItem(id, checked) {
      const { error } = await supabaseClient
        .from('shopping_items')
        .update({ checked })
        .eq('id', id);

      if (error) {
        showError('업데이트 실패: ' + error.message);
        await loadItems();
        return;
      }

      const item = items.find(i => i.id === id);
      if (item) item.checked = checked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await supabaseClient
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제 실패: ' + error.message);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await supabaseClient
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        showError('삭제 실패: ' + error.message);
        return;
      }

      items = items.filter(i => !i.checked);
      render();
    }

    loadItems();
  </script>
</body>
</html>
